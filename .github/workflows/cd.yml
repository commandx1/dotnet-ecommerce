name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: vars
        run: |
          echo "api_image=ghcr.io/${{ github.repository_owner }}/dotnet-ecommerce-api" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${{ github.repository_owner }}/dotnet-ecommerce-frontend" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.api_image }}:latest
            ${{ steps.vars.outputs.api_image }}:${{ steps.vars.outputs.sha_tag }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.frontend_image }}:latest
            ${{ steps.vars.outputs.frontend_image }}:${{ steps.vars.outputs.sha_tag }}
